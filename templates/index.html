{% extends "base.html" %}

{% block content %}

<h2>Мои записи</h2>

{% if entries %}

    {% for entry in entries %}
        <div class="card">

            <h3>{{ entry.title }}</h3>

            <p class="date">
                {{ entry.date }}
            </p>

            <a href="{{ url_for('detail', entry_id=entry.id) }}">
                Читать
            </a>

            <form action="{{ url_for('delete_entry', entry_id=entry.id) }}"
                  method="POST">

                <button type="submit">
                    Удалить
                </button>

            </form>

        </div>
    {% endfor %}

{% else %}

    <p>Пока нет записей. Создайте первую!</p>

{% endif %}

{% endblock %}
