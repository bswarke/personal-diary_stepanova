{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>{{ entry.title }}</h2>

    <p class="date">
        {{ entry.date }}
    </p>

    <p>
        {{ entry.content }}
    </p>

    <a href="{{ url_for('edit_entry', entry_id=entry.id) }}">
        Редактировать
    </a>

    <form action="{{ url_for('delete_entry', entry_id=entry.id) }}"
          method="POST">

        <button type="submit">
            Удалить
        </button>

    </form>

    <a href="{{ url_for('index') }}">
        На главную
    </a>

</div>

{% endblock %}
